name: E2E BDD Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  e2e:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: npm
    - name: Restore Allure history cache
      id: allure-history-restore
      uses: actions/cache/restore@v4
      with:
        path: .allure-history
        key: allure-history-${{ github.ref }}-${{ github.run_id }}
        restore-keys: |
          allure-history-${{ github.ref }}-
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run E2E tests (BDD)
      run: npm run test:e2e
    - name: Inject history into allure-results
      if: ${{ !cancelled() }}
      run: |
        mkdir -p allure-results/history
        if [ -d ".allure-history" ]; then
          cp -R .allure-history/. allure-results/history/
        fi
    - name: Generate Allure report
      if: ${{ !cancelled() }}
      run: npm run allure:generate
    - name: Update Allure history cache content
      if: ${{ !cancelled() }}
      run: |
        mkdir -p .allure-history
        if [ -d "allure-report/history" ]; then
          cp -R allure-report/history/. .allure-history/
        fi
    - name: Save Allure history cache
      if: ${{ !cancelled() }}
      uses: actions/cache/save@v4
      with:
        path: .allure-history
        key: ${{ steps.allure-history-restore.outputs.cache-primary-key }}
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: allure-report
        path: allure-report/
        retention-days: 30
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: allure-results
        path: allure-results/
        retention-days: 30
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: test-results
        path: test-results/
        retention-days: 30
